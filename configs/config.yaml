database:
  path: "C:/Users/icaro.zelioli.dev/Documents/Projects/timesheet_appointment/personal_organizer_back/database/personal_organizer.db"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  raw_filename: "todo_tasks.parquet"
  time_spent_raw_filename: "time_spent_tasks.parquet"
  time_spent_processed_filename: "eda_time_spent_features.parquet"
  # Increment when schema or source DB changes in a breaking way.
  # Use ISO date (YYYY-MM-DD) so every MLflow run is traceable to a data snapshot.
  version: "2026-04-06"

extraction:
  table: "todo_task"
  project_table: "project"
  label_columns:
    - "important"
    - "urgent"
  feature_columns:
    - "id"
    - "description"
    - "comments"
    - "project_id"
    - "due_date"
    - "created_at"
    - "updated_at"
    - "register_timesheet"
    - "completed_date"

eda:
  # Figures are saved to docs/figures/<model>/ and versioned alongside the report.
  figures_dir: "docs/figures"
  reports_dir: "docs"
  dpi: 120
  fig_width: 12
  fig_height: 6

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name_model1: "important-classifier"
  experiment_name_model2: "urgent-classifier"
  experiment_name_model3: "time-spent-regressor"
  experiment_name_model3b: "time-bucket-classifier"
  registered_model_name_model1: "important-classifier"
  registered_model_name_model2: "urgent-classifier"
  registered_model_name_model3: "time-spent-regressor"
  registered_model_name_model3b: "time-bucket-classifier"

training:
  random_seed: 42
  cv_folds: 5
  test_size: 0.2
  optuna_trials: 50
  optuna_timeout_seconds: 3600   # 1 hour max
  scoring_metric: "f1_macro"

models_dir: "models"
